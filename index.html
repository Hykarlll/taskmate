<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <meta name="description" content="TaskMate – Personal Task Manager | IMS566 Individual Project"/>
  <meta name="author" content="IMS566 Student"/>
  <title>TaskMate – Task Manager</title>

  <!-- Tailwind CSS -->
  <script src="https://cdn.tailwindcss.com"></script>

  <!-- Font Awesome Icons -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css"/>

  <!-- Google Fonts -->
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Poppins:wght@400;500;600;700;800&display=swap" rel="stylesheet"/>

  <!-- Custom CSS -->
  <link rel="stylesheet" href="css/style.css">

  <style>
    .login-wrapper {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 1rem;
      position: relative;
      z-index: 10;
    }
    .card-login {
      background: rgba(30, 31, 46, 0.85);
      backdrop-filter: blur(16px);
      border: 1px solid #2e3057;
      border-radius: 20px;
      max-width: 450px;
      width: 100%;
    }
    #vanta-bg {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      z-index: 0;
    }
    .form-control {
      background: #12131f;
      border: 1px solid #2e3057;
      color: white;
      border-radius: 12px;
      padding: 0.75rem 1rem;
    }
    .form-control:focus {
      background: #12131f;
      border-color: #6366f1;
      outline: none;
      box-shadow: 0 0 0 2px rgba(99,102,241,0.3);
      color: white;
    }
    .btn-primary {
      background: linear-gradient(135deg, #6366f1, #818cf8);
      border: none;
      border-radius: 12px;
      padding: 0.75rem;
      font-weight: 600;
    }
    .btn-primary:hover {
      background: linear-gradient(135deg, #4f46e5, #6366f1);
    }
  </style>
</head>
<body>

<div id="vanta-bg"></div>

<div class="login-wrapper">
  <div class="card-login p-8">
    
    <!-- Brand -->
    <div class="text-center mb-8">
      <div class="inline-flex items-center justify-center w-16 h-16 rounded-2xl mb-4 bg-gradient-to-r from-indigo-500 to-indigo-400">
        <i class="fa-solid fa-list-check text-white text-2xl"></i>
      </div>
      <h1 class="font-poppins text-3xl font-bold text-white">TaskMate</h1>
      <p class="text-slate-400 text-sm mt-1">UI Prototype | IMS566 - Individual Assignment</p>
    </div>

    <!-- Tabs -->
    <div class="flex gap-1 p-1 rounded-xl mb-6" style="background:#12131f;">
      <button id="tabLogin" onclick="switchAuthTab('login')" class="flex-1 py-2 rounded-lg text-sm font-semibold text-white" style="background:#6366f1;">
        <i class="fa-solid fa-right-to-bracket mr-1"></i> Login
      </button>
      <button id="tabRegister" onclick="switchAuthTab('register')" class="flex-1 py-2 rounded-lg text-sm font-semibold text-slate-400">
        <i class="fa-solid fa-user-plus mr-1"></i> Register
      </button>
    </div>

    <!-- Login Form -->
    <div id="loginForm">
      <div id="loginError" class="hidden mb-4 px-4 py-3 rounded-xl text-sm font-medium text-red-300" style="background:rgba(239,68,68,0.12);border:1px solid rgba(239,68,68,0.3);">
        <i class="fa-solid fa-circle-exclamation mr-2"></i> Invalid username or password.
      </div>

      <div class="mb-4">
        <label class="block text-xs font-semibold uppercase text-slate-400 mb-2">Username</label>
        <div class="relative">
          <i class="fa-solid fa-user absolute left-4 top-1/2 -translate-y-1/2 text-slate-500 text-sm"></i>
          <input id="loginUser" type="text" placeholder="e.g. Haikal" class="form-control w-full pl-10">
        </div>
      </div>

      <div class="mb-6">
        <label class="block text-xs font-semibold uppercase text-slate-400 mb-2">Password</label>
        <div class="relative">
          <i class="fa-solid fa-lock absolute left-4 top-1/2 -translate-y-1/2 text-slate-500 text-sm"></i>
          <input id="loginPass" type="password" placeholder="••••••••" class="form-control w-full pl-10">
            <button type="button" id="togglePassword" class="absolute right-3 top-1/2 -translate-y-1/2 text-slate-500 hover:text-indigo-400">
            <i class="fa-solid fa-eye" id="eyeIcon"></i>
          </button>
        </div>
      </div>

      <button onclick="doLogin()" class="btn-primary w-full py-3 mb-4">
        <i class="fa-solid fa-right-to-bracket mr-2"></i> Sign In
      </button>

      <div class="mt-4 p-3 rounded-xl text-center bg-[#12131f] border border-[#2e3057]">
        <i class="fa-solid fa-circle-info mr-1 text-indigo-400"></i>
        <span class="text-slate-400 text-xs">Demo: </span>
        <span class="text-indigo-400 font-semibold text-xs">Haikal / password123</span>
        <span class="text-slate-500 text-xs"> or </span>
        <span class="text-indigo-400 font-semibold text-xs">User / 12345</span>
      </div>
    </div>
 
    <!-- Register Form -->
    <div id="registerForm" class="hidden">
      <div class="mb-4">
        <label class="block text-xs font-semibold uppercase text-slate-400 mb-2">Full Name</label>
        <input type="text" placeholder="Your full name" class="form-control w-full">
      </div>
      <div class="mb-4">
        <label class="block text-xs font-semibold uppercase text-slate-400 mb-2">Email</label>
        <input type="email" placeholder="you@example.com" class="form-control w-full">
      </div>
      <div class="mb-4">
        <label class="block text-xs font-semibold uppercase text-slate-400 mb-2">Password</label>
        <input type="password" placeholder="Min. 6 characters" class="form-control w-full">
      </div>
      <button onclick="doRegister()" class="btn-primary w-full py-3">
        <i class="fa-solid fa-user-plus mr-2"></i> Create Account
      </button>
      <p class="text-center text-xs text-slate-500 mt-4">UI Prototype – No actual account created</p>
    </div>

    <div class="text-center mt-6">
      <p class="text-slate-500 text-xs">IMS566 · Advanced Web Design & Development · UI Prototype</p>
    </div>
  </div>
</div>

<!-- Vanta Background -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r121/three.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/vanta@latest/dist/vanta.waves.min.js"></script>
<script>
  VANTA.WAVES({
    el: "#vanta-bg",
    mouseControls: true,
    touchControls: true,
    gyroControls: false,
    color: 0x0d0e1a,
    shininess: 40,
    waveHeight: 18,
    waveSpeed: 0.6,
    zoom: 0.9
  });


  // Auth Tab Switching and Login Logic (UI Only)
  function switchAuthTab(tab) {
    const isLogin = tab === 'login';
    document.getElementById('loginForm').classList.toggle('hidden', !isLogin);
    document.getElementById('registerForm').classList.toggle('hidden', isLogin);
    const tabLogin = document.getElementById('tabLogin');
    const tabRegister = document.getElementById('tabRegister');
    if (isLogin) {
      tabLogin.style.background = '#6366f1';
      tabLogin.classList.remove('text-slate-400');
      tabLogin.classList.add('text-white');
      tabRegister.style.background = '';
      tabRegister.classList.remove('text-white');
      tabRegister.classList.add('text-slate-400');
    } else {
      tabRegister.style.background = '#6366f1';
      tabRegister.classList.remove('text-slate-400');
      tabRegister.classList.add('text-white');
      tabLogin.style.background = '';
      tabLogin.classList.remove('text-white');
      tabLogin.classList.add('text-slate-400');
    }
  }

  function doRegister() {
  // UI ONLY - does absolutely nothing
  return false;
}

  function doLogin() {
    const username = document.getElementById('loginUser').value.trim();
    const password = document.getElementById('loginPass').value.trim();
    const errorDiv = document.getElementById('loginError');
    errorDiv.classList.add('hidden');
    
    const validUsers = [
      { username: 'Haikal', password: 'password123' },
      { username: 'User', password: '12345' }
    ];
    const validUser = validUsers.find(u => u.username === username && u.password === password);
    
    if (validUser) {
      sessionStorage.setItem('isLoggedIn', 'true');
      sessionStorage.setItem('username', username);
      window.location.href = 'dashboard.html';
    } else {
      errorDiv.classList.remove('hidden');
    }
  }

  document.getElementById('loginPass').addEventListener('keypress', function(e) {
    if (e.key === 'Enter') doLogin();
  });
</script>

</body>
</html>
